<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Voice</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0c0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: #252535;
    --text: #e8e6f0;
    --text-muted: #6b6880;
    --text-dim: #3d3b50;
    --accent: #7c6fff;
    --accent2: #c084fc;
    --accent-glow: rgba(124, 111, 255, 0.15);
    --user: #2dd4bf;
    --user-glow: rgba(45, 212, 191, 0.1);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 背景の光 */
  .bg-glow {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .bg-glow::before {
    content: '';
    position: absolute;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(ellipse, rgba(124,111,255,0.06) 0%, transparent 70%);
    border-radius: 50%;
  }

  /* SETUP SCREEN */
  #screen-setup {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    gap: 2rem;
  }

  .setup-title {
    font-family: 'Shippori Mincho', serif;
    font-size: 1.8rem;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-align: center;
  }
  .setup-sub {
    color: var(--text-muted);
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    text-align: center;
  }

  .setup-section {
    width: 100%;
    max-width: 500px;
  }

  .setup-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.8rem;
  }

  .api-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.8rem 1rem;
    border-radius: 8px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    transition: border-color 0.2s;
  }
  .api-input:focus { outline: none; border-color: var(--accent); }

  .voice-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 260px;
    overflow-y: auto;
  }

  .voice-item {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .voice-item:hover { border-color: var(--accent); }
  .voice-item.selected { border-color: var(--accent); background: var(--accent-glow); }

  .voice-name { flex: 1; font-size: 0.85rem; color: var(--text); }
  .voice-lang { font-size: 0.75rem; color: var(--text-muted); }

  .preview-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.3rem 0.7rem;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
  }
  .preview-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .voice-params {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    margin-top: 1rem;
  }

  .param-group label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
  }

  input[type=range] {
    width: 100%;
    accent-color: var(--accent);
  }

  .param-value {
    font-size: 0.75rem;
    color: var(--accent);
    text-align: right;
    margin-top: 0.2rem;
  }

  .start-btn {
    background: var(--accent);
    border: none;
    color: white;
    padding: 1rem 3rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Shippori Mincho', serif;
    font-size: 1.1rem;
    letter-spacing: 0.1em;
    transition: all 0.2s;
    margin-top: 1rem;
  }
  .start-btn:hover { opacity: 0.85; transform: translateY(-1px); }
  .start-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; transform: none; }

  /* MAIN SCREEN */
  #screen-main {
    display: none;
    flex-direction: column;
    height: 100vh;
    position: relative;
    z-index: 1;
  }

  header {
    padding: 1.2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Shippori Mincho', serif;
    font-size: 1rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--user); box-shadow: 0 0 8px var(--user); }
  .status-dot.thinking { background: var(--accent); box-shadow: 0 0 8px var(--accent); animation: pulse 1s infinite; }
  .status-dot.speaking { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); animation: pulse 0.6s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* CHAT */
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.2rem;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    gap: 0.8rem;
    animation: msgIn 0.3s ease;
    max-width: 85%;
  }
  @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    flex-shrink: 0;
    letter-spacing: 0;
  }
  .msg.user .msg-avatar { background: var(--user-glow); border: 1px solid var(--user); color: var(--user); }
  .msg.assistant .msg-avatar { background: var(--accent-glow); border: 1px solid var(--accent); color: var(--accent); }

  .msg-bubble {
    padding: 0.8rem 1rem;
    border-radius: 12px;
    font-size: 0.88rem;
    line-height: 1.7;
    font-family: 'Shippori Mincho', serif;
  }
  .msg.user .msg-bubble {
    background: var(--user-glow);
    border: 1px solid rgba(45,212,191,0.2);
    color: var(--text);
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--accent-glow);
    border: 1px solid rgba(124,111,255,0.2);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  .typing-indicator {
    display: flex;
    gap: 4px;
    padding: 0.8rem 1rem;
    align-items: center;
  }
  .typing-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingDot 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingDot { 0%,60%,100%{transform:translateY(0);opacity:0.4} 30%{transform:translateY(-6px);opacity:1} }

  /* CONTROLS */
  .controls {
    padding: 1rem 1.5rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.8rem;
    flex-shrink: 0;
  }

  .mic-area {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .mic-btn {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    position: relative;
    font-size: 1.4rem;
  }
  .mic-btn:hover { border-color: var(--user); color: var(--user); }
  .mic-btn.recording {
    border-color: var(--user);
    color: var(--user);
    background: var(--user-glow);
    animation: micPulse 1s infinite;
  }
  @keyframes micPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(45,212,191,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(45,212,191,0); }
  }

  .mic-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
    text-align: center;
    min-width: 120px;
  }

  .stop-speaking-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'DM Mono', monospace;
    transition: all 0.2s;
    display: none;
  }
  .stop-speaking-btn.visible { display: block; }
  .stop-speaking-btn:hover { border-color: var(--accent2); color: var(--accent2); }

  .hint {
    font-size: 0.7rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* 音声可視化 */
  .wave-container {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 24px;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .wave-container.active { opacity: 1; }
  .wave-bar {
    width: 3px;
    border-radius: 2px;
    background: var(--user);
    animation: wave 0.8s infinite ease-in-out;
    height: 4px;
  }
  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  @keyframes wave { 0%,100%{height:4px} 50%{height:20px} }

  .settings-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    transition: color 0.2s;
    letter-spacing: 0.05em;
  }
  .settings-btn:hover { color: var(--text); }

  /* scrollbar */
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- SETUP SCREEN -->
<div id="screen-setup">
  <div>
    <p class="setup-title">Claude Voice</p>
    <p class="setup-sub" style="margin-top:0.5rem">声で話しかけると、声で返します</p>
  </div>

  <div class="setup-section">
    <p class="setup-label">Anthropic API Key</p>
    <input type="password" class="api-input" id="api-key" placeholder="sk-ant-..." oninput="checkReady()">
  </div>

  <div class="setup-section">
    <p class="setup-label">声を選ぶ</p>
    <div class="voice-list" id="voice-list">
      <p style="color:var(--text-muted);font-size:0.8rem">読み込み中...</p>
    </div>
    <div class="voice-params">
      <div class="param-group">
        <label>PITCH（音の高さ）</label>
        <input type="range" id="pitch" min="0.5" max="1.5" step="0.05" value="0.9" oninput="updateParam('pitch')">
        <div class="param-value" id="pitch-val">0.9</div>
      </div>
      <div class="param-group">
        <label>RATE（話す速さ）</label>
        <input type="range" id="rate" min="0.5" max="1.5" step="0.05" value="0.95" oninput="updateParam('rate')">
        <div class="param-value" id="rate-val">0.95</div>
      </div>
      <div class="param-group">
        <label>VOLUME（音量）</label>
        <input type="range" id="volume" min="0.1" max="1" step="0.05" value="0.9" oninput="updateParam('volume')">
        <div class="param-value" id="volume-val">0.9</div>
      </div>
    </div>
  </div>

  <div class="setup-section">
    <p class="setup-label">今日話したいこと（任意）</p>
    <textarea class="api-input" id="context-input" rows="4" placeholder="例：会議MVPアプリの開発について話したい。話者分離の方法をディスカッションしたい。&#10;&#10;ここに会話の背景や続きを書いておくと、その文脈でClaudeが返答してくれます。" style="resize:vertical; line-height:1.6; font-family:'DM Mono',monospace; font-size:0.82rem;"></textarea>
  </div>

  <button class="start-btn" id="start-btn" onclick="startApp()" disabled>はじめる</button>
</div>

<!-- MAIN SCREEN -->
<div id="screen-main">
  <header>
    <div class="logo">Claude Voice</div>
    <div style="display:flex;align-items:center;gap:0.8rem">
      <button class="settings-btn" onclick="goSettings()">⚙ 設定</button>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <div id="chat"></div>

  <div class="controls">
    <div class="mic-area">
      <div class="wave-container" id="wave">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <button class="stop-speaking-btn" id="stop-btn" onclick="stopSpeaking()">■ 停止</button>
    </div>
    <p class="mic-label" id="mic-label">タップして話しかける</p>
    <p class="hint">長押し不要 — タップでON/OFF</p>
  </div>
</div>

<script>
// ===== STATE =====
let apiKey = '';
let selectedVoice = null;
let voices = [];
let pitch = 0.9, rate = 0.95, volume = 0.9;
let recognition = null;
let isRecording = false;
let isSpeaking = false;
let isSpeechReady = false;
let currentUtterance = null;
let conversationHistory = [];

const BASE_SYSTEM_PROMPT = `あなたはClaudeです。音声で会話しています。
以下のことを守ってください：
- 返答は簡潔に、1〜3文程度にまとめてください
- 音声で読み上げられるので、マークダウン記法（**太字**、# 見出し、箇条書きなど）は使わないでください
- 自然な話し言葉で返してください
- 長い説明が必要な場合も、まず核心を一言で言ってから補足してください`;

let SYSTEM_PROMPT = BASE_SYSTEM_PROMPT;

// ===== SETUP =====
window.onload = () => {
  loadVoices();
  if (window.speechSynthesis.onvoiceschanged !== undefined) {
    window.speechSynthesis.onvoiceschanged = loadVoices;
  }
  // 保存済みキー読み込み
  const saved = sessionStorage.getItem('claude_api_key');
  if (saved) {
    document.getElementById('api-key').value = saved;
    checkReady();
  }
};

function loadVoices() {
  voices = window.speechSynthesis.getVoices();
  const jaVoices = voices.filter(v => v.lang.startsWith('ja'));
  const list = document.getElementById('voice-list');

  if (jaVoices.length === 0) {
    list.innerHTML = '<p style="color:var(--text-muted);font-size:0.8rem">日本語音声が見つかりません。ブラウザの設定をご確認ください。</p>';
    return;
  }

  list.innerHTML = '';
  jaVoices.forEach((v, i) => {
    const item = document.createElement('div');
    item.className = 'voice-item' + (i === 0 ? ' selected' : '');
    item.innerHTML = `
      <div style="flex:1">
        <div class="voice-name">${v.name}</div>
        <div class="voice-lang">${v.lang} ${v.localService ? '· local' : '· network'}</div>
      </div>
      <button class="preview-btn" onclick="previewVoice(event, '${v.name}')">試聴</button>
    `;
    item.onclick = (e) => {
      if (e.target.classList.contains('preview-btn')) return;
      document.querySelectorAll('.voice-item').forEach(el => el.classList.remove('selected'));
      item.classList.add('selected');
      selectedVoice = v;
    };
    list.appendChild(item);
    if (i === 0) selectedVoice = v;
  });
  checkReady();
}

function previewVoice(e, name) {
  e.stopPropagation();
  window.speechSynthesis.cancel();
  const v = voices.find(x => x.name === name);
  if (!v) return;
  const u = new SpeechSynthesisUtterance('こんにちは、私の声はこんな感じです。');
  u.voice = v;
  u.pitch = pitch;
  u.rate = rate;
  u.volume = volume;
  window.speechSynthesis.speak(u);
}

function updateParam(param) {
  const val = parseFloat(document.getElementById(param).value);
  if (param === 'pitch') pitch = val;
  else if (param === 'rate') rate = val;
  else if (param === 'volume') volume = val;
  document.getElementById(param + '-val').textContent = val.toFixed(2);
}

function checkReady() {
  const key = document.getElementById('api-key').value.trim();
  document.getElementById('start-btn').disabled = !key;
}

function startApp() {
  apiKey = document.getElementById('api-key').value.trim();
  sessionStorage.setItem('claude_api_key', apiKey);

  // コンテキストをシステムプロンプトに追加
  const context = document.getElementById('context-input').value.trim();
  if (context) {
    SYSTEM_PROMPT = BASE_SYSTEM_PROMPT + `\n\n## 今日の会話の背景・コンテキスト\n${context}\n\nこの背景を踏まえて会話してください。`;
  } else {
    SYSTEM_PROMPT = BASE_SYSTEM_PROMPT;
  }

  document.getElementById('screen-setup').style.display = 'none';
  document.getElementById('screen-main').style.display = 'flex';
  initRecognition();

  const greeting = context
    ? 'わかりました。その話を続けましょう。'
    : 'こんにちは。何でも話しかけてください。';
  addMessage('assistant', greeting);
  speak(greeting);
}

function goSettings() {
  window.speechSynthesis.cancel();
  document.getElementById('screen-setup').style.display = 'flex';
  document.getElementById('screen-main').style.display = 'none';
}

// ===== SPEECH RECOGNITION =====
function initRecognition() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('このブラウザは音声認識に対応していません。Chromeをお使いください。');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.continuous = false;
  recognition.interimResults = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopRecording();
    addMessage('user', text);
    sendToClauде(text);
  };

  recognition.onerror = (e) => {
    stopRecording();
    setMicLabel('エラー: ' + e.error);
    setTimeout(() => setMicLabel('タップして話しかける'), 2000);
  };

  recognition.onend = () => {
    if (isRecording) stopRecording();
  };
}

function toggleMic() {
  if (isSpeaking) {
    stopSpeaking();
    return;
  }
  if (isRecording) {
    stopRecording();
  } else {
    startRecording();
  }
}

function startRecording() {
  if (!recognition) return;
  window.speechSynthesis.cancel();
  isRecording = true;
  recognition.start();
  document.getElementById('mic-btn').classList.add('recording');
  document.getElementById('wave').classList.add('active');
  setMicLabel('聞いています...');
  setStatus('active');
}

function stopRecording() {
  isRecording = false;
  if (recognition) recognition.abort();
  document.getElementById('mic-btn').classList.remove('recording');
  document.getElementById('wave').classList.remove('active');
  setMicLabel('タップして話しかける');
  setStatus('');
}

// ===== TTS =====
function speak(text) {
  window.speechSynthesis.cancel();
  const clean = text.replace(/[*#`_~]/g, '').replace(/\n+/g, '。');
  const u = new SpeechSynthesisUtterance(clean);
  if (selectedVoice) u.voice = selectedVoice;
  u.pitch = pitch;
  u.rate = rate;
  u.volume = volume;
  u.lang = 'ja-JP';

  currentUtterance = u;
  isSpeaking = true;
  document.getElementById('stop-btn').classList.add('visible');
  setStatus('speaking');
  setMicLabel('読み上げ中...');

  u.onend = () => {
    isSpeaking = false;
    currentUtterance = null;
    document.getElementById('stop-btn').classList.remove('visible');
    setStatus('');
    setMicLabel('タップして話しかける');
  };
  u.onerror = () => {
    isSpeaking = false;
    document.getElementById('stop-btn').classList.remove('visible');
    setStatus('');
    setMicLabel('タップして話しかける');
  };
  window.speechSynthesis.speak(u);
}

function stopSpeaking() {
  window.speechSynthesis.cancel();
  isSpeaking = false;
  document.getElementById('stop-btn').classList.remove('visible');
  setStatus('');
  setMicLabel('タップして話しかける');
}

// ===== CLAUDE API =====
async function sendToClauде(text) {
  setStatus('thinking');
  setMicLabel('考えています...');

  // タイピングインジケーター
  const typingId = addTyping();

  conversationHistory.push({ role: 'user', content: text });

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversationHistory
      })
    });

    removeTyping(typingId);

    if (!res.ok) {
      const err = await res.json();
      addMessage('assistant', 'エラーが発生しました: ' + (err.error?.message || res.status));
      setStatus(''); setMicLabel('タップして話しかける');
      return;
    }

    const data = await res.json();
    const reply = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: reply });

    addMessage('assistant', reply);
    speak(reply);

  } catch (e) {
    removeTyping(typingId);
    addMessage('assistant', 'ネットワークエラーが発生しました。');
    setStatus(''); setMicLabel('タップして話しかける');
  }
}

// ===== UI HELPERS =====
function addMessage(role, text) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `
    <div class="msg-avatar">${role === 'user' ? 'YOU' : 'AI'}</div>
    <div class="msg-bubble">${text}</div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

let typingCounter = 0;
function addTyping() {
  const id = 'typing-' + (++typingCounter);
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = id;
  div.innerHTML = `
    <div class="msg-avatar">AI</div>
    <div class="msg-bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>
  `;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return id;
}

function removeTyping(id) {
  const el = document.getElementById(id);
  if (el) el.remove();
}

function setStatus(state) {
  const dot = document.getElementById('status-dot');
  dot.className = 'status-dot' + (state ? ' ' + state : '');
}

function setMicLabel(text) {
  document.getElementById('mic-label').textContent = text;
}
</script>
