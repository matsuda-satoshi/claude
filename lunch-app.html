<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今日のランチ、決めてやる。</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=M+PLUS+1p:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --surface: #1a1815;
    --surface2: #242220;
    --accent: #e8a045;
    --accent2: #e85d45;
    --text: #f0ead6;
    --text-muted: #7a7060;
    --border: #2e2b26;
    --green: #5dbd7a;
    --red: #e85d45;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'M PLUS 1p', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 1000;
    opacity: 0.4;
  }

  header {
    padding: 2rem 2rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .logo {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.3rem;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  .logo span {
    color: var(--text-muted);
    font-size: 0.8rem;
    display: block;
    font-family: 'M PLUS 1p', sans-serif;
    margin-top: 2px;
  }

  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.5rem 1rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--accent); }

  /* === MAIN SCREEN === */
  #screen-main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 2rem;
    text-align: center;
  }

  .headline {
    font-family: 'Zen Antique Soft', serif;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    line-height: 1.3;
    margin-bottom: 0.5rem;
    color: var(--text);
  }

  .sub-headline {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 3rem;
  }

  .office-select-label {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .office-buttons {
    display: flex;
    gap: 1rem;
    margin-bottom: 3rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .office-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--text-muted);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .office-btn:hover { border-color: var(--accent); color: var(--text); }
  .office-btn.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: #0f0e0c;
    font-weight: 700;
  }

  .decide-btn {
    background: var(--accent2);
    border: none;
    color: white;
    padding: 1.2rem 3rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.4rem;
    letter-spacing: 0.05em;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .decide-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: white;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .decide-btn:hover::after { opacity: 0.1; }
  .decide-btn:active { transform: scale(0.97); }
  .decide-btn:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }

  /* === RESULT SCREEN === */
  #screen-result {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 2rem;
    text-align: center;
  }

  .result-label {
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
    animation: fadeIn 0.5s ease;
  }

  .result-name {
    font-family: 'Zen Antique Soft', serif;
    font-size: clamp(2rem, 8vw, 5rem);
    line-height: 1.2;
    margin-bottom: 1rem;
    animation: slideUp 0.5s ease;
  }

  .result-tags {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 0.8rem;
    animation: fadeIn 0.6s ease;
  }

  .tag {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.3rem 0.8rem;
    border-radius: 100px;
    font-size: 0.8rem;
  }
  .tag.open { border-color: var(--green); color: var(--green); background: rgba(93,189,122,0.08); }
  .tag.convenience { border-color: var(--accent); color: var(--accent); background: rgba(232,160,69,0.08); }

  .result-notes {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2.5rem;
    animation: fadeIn 0.7s ease;
    max-width: 400px;
  }

  .result-actions {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeIn 0.8s ease;
  }

  .nope-btn {
    background: var(--surface);
    border: 2px solid var(--border);
    color: var(--text-muted);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.95rem;
    transition: all 0.2s;
  }
  .nope-btn:hover { border-color: var(--accent2); color: var(--accent2); }
  .nope-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .accept-btn {
    background: var(--green);
    border: none;
    color: #0f0e0c;
    padding: 0.8rem 2rem;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    transition: all 0.2s;
  }
  .accept-btn:hover { opacity: 0.9; }

  .nope-count {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 0.8rem;
    animation: fadeIn 0.5s ease;
  }
  .nope-count.warning { color: var(--accent2); }

  .back-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.85rem;
    margin-top: 1.5rem;
    font-family: 'M PLUS 1p', sans-serif;
    text-decoration: underline;
    transition: color 0.2s;
  }
  .back-btn:hover { color: var(--text); }

  /* === LIST SCREEN === */
  #screen-list {
    display: none;
    padding: 2rem;
    max-width: 800px;
    margin: 0 auto;
  }

  .screen-title {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.8rem;
    margin-bottom: 0.5rem;
    color: var(--accent);
  }

  .screen-sub {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }

  .add-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .form-title {
    font-size: 0.8rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  .form-grid.single { grid-template-columns: 1fr; }

  label {
    display: block;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-bottom: 0.3rem;
    letter-spacing: 0.05em;
  }

  input, select, textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.6rem 0.8rem;
    border-radius: 6px;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  select option { background: var(--surface2); }

  .checkbox-row {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.9rem;
    color: var(--text-muted);
    cursor: pointer;
  }
  .checkbox-row input[type=checkbox] {
    width: auto;
    accent-color: var(--accent);
  }

  .submit-btn {
    background: var(--accent);
    border: none;
    color: #0f0e0c;
    padding: 0.7rem 1.5rem;
    border-radius: 6px;
    cursor: pointer;
    font-family: 'M PLUS 1p', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    transition: opacity 0.2s;
    margin-top: 0.5rem;
  }
  .submit-btn:hover { opacity: 0.85; }

  .restaurant-list { display: flex; flex-direction: column; gap: 0.8rem; }

  .restaurant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    transition: border-color 0.2s;
  }
  .restaurant-card:hover { border-color: var(--accent); }

  .card-info { flex: 1; }
  .card-name { font-weight: 700; margin-bottom: 0.3rem; }
  .card-meta { font-size: 0.8rem; color: var(--text-muted); }

  .card-actions { display: flex; gap: 0.5rem; }

  .edit-btn, .delete-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    font-family: 'M PLUS 1p', sans-serif;
    transition: all 0.2s;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }
  .delete-btn:hover { border-color: var(--red); color: var(--red); }

  .filter-row {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.2rem;
    flex-wrap: wrap;
  }
  .filter-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 0.4rem 1rem;
    border-radius: 100px;
    cursor: pointer;
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #0f0e0c; font-weight: 700; }

  .empty-state {
    text-align: center;
    padding: 3rem;
    color: var(--text-muted);
  }

  /* === ACCEPTED SCREEN === */
  #screen-accepted {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: 2rem;
    text-align: center;
  }

  .accepted-emoji {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: pop 0.4s ease;
  }

  .accepted-msg {
    font-family: 'Zen Antique Soft', serif;
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    animation: slideUp 0.5s ease;
  }

  .accepted-sub {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-bottom: 2rem;
    animation: fadeIn 0.6s ease;
  }

  /* toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: transform 0.3s ease;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pop { 0% { transform: scale(0); } 70% { transform: scale(1.2); } 100% { transform: scale(1); } }

  .loading {
    color: var(--text-muted);
    font-size: 0.9rem;
    animation: fadeIn 0.3s ease;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { flex-direction: column; gap: 1rem; align-items: flex-start; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    今日のランチ、決めてやる。
    <span>決断のリソースをランチに使うな</span>
  </div>
  <button class="nav-btn" onclick="showScreen('list')">🍴 お店を管理</button>
</header>

<!-- MAIN SCREEN -->
<div id="screen-main">
  <p class="headline">どの事務所<br>にいますか？</p>
  <p class="sub-headline">それだけ教えてくれれば、あとは決める。</p>
  <p class="office-select-label">事務所を選択</p>
  <div class="office-buttons">
    <button class="office-btn" onclick="selectOffice('nihonbashi')" id="btn-nihonbashi">🏢 日本橋</button>
    <button class="office-btn" onclick="selectOffice('uchikanda')" id="btn-uchikanda">🏢 内神田</button>
  </div>
  <button class="decide-btn" id="decide-btn" onclick="decide()" disabled>決める</button>
</div>

<!-- RESULT SCREEN -->
<div id="screen-result">
  <p class="result-label">🎯 今日のランチはここだ</p>
  <p class="result-name" id="result-name">—</p>
  <div class="result-tags" id="result-tags"></div>
  <p class="result-notes" id="result-notes"></p>
  <div class="result-actions">
    <button class="nope-btn" id="nope-btn" onclick="nope()">それは嫌だ 😤</button>
    <button class="accept-btn" onclick="accept()">これにする 👍</button>
  </div>
  <p class="nope-count" id="nope-count"></p>
  <button class="back-btn" onclick="showScreen('main')">← 事務所を選び直す</button>
</div>

<!-- ACCEPTED SCREEN -->
<div id="screen-accepted">
  <div class="accepted-emoji">🍱</div>
  <p class="accepted-msg" id="accepted-msg">行ってらっしゃい！</p>
  <p class="accepted-sub" id="accepted-sub"></p>
  <button class="decide-btn" onclick="showScreen('main')" style="font-size:1rem; padding: 0.8rem 2rem; margin-top:1rem;">最初に戻る</button>
</div>

<!-- LIST SCREEN -->
<div id="screen-list">
  <p class="screen-title">お店を管理する</p>
  <p class="screen-sub">誰でも追加・編集できます。営業時間を正確に入れると精度が上がります。</p>

  <div class="add-form" id="add-form-section">
    <p class="form-title" id="form-mode-label">＋ お店を追加</p>
    <div class="form-grid">
      <div>
        <label>お店の名前 *</label>
        <input type="text" id="f-name" placeholder="例：松屋 日本橋店">
      </div>
      <div>
        <label>事務所 *</label>
        <select id="f-office">
          <option value="nihonbashi">日本橋</option>
          <option value="uchikanda">内神田</option>
        </select>
      </div>
      <div>
        <label>ジャンル</label>
        <input type="text" id="f-genre" placeholder="例：定食、ラーメン、コンビニ">
      </div>
      <div>
        <label>住所・場所メモ</label>
        <input type="text" id="f-address" placeholder="例：日本橋3丁目 徒歩3分">
      </div>
      <div>
        <label>営業開始 (HH:MM)</label>
        <input type="time" id="f-open" value="11:00">
      </div>
      <div>
        <label>営業終了 (HH:MM)</label>
        <input type="time" id="f-close" value="14:00">
      </div>
    </div>
    <div class="form-grid single">
      <div>
        <label>定休日メモ</label>
        <input type="text" id="f-closed" placeholder="例：土日祝、毎週月曜">
      </div>
    </div>
    <div style="margin: 0.8rem 0;">
      <label class="checkbox-row">
        <input type="checkbox" id="f-convenience">
        コンビニ・スーパー（買って帰る系）
      </label>
    </div>
    <div class="form-grid single">
      <div>
        <label>メモ・おすすめポイント</label>
        <input type="text" id="f-notes" placeholder="例：日替わりが安い、混むので11:30前推奨">
      </div>
    </div>
    <div style="display:flex; gap:0.8rem; align-items:center;">
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">追加する</button>
      <button class="nav-btn" id="cancel-edit-btn" style="display:none;" onclick="cancelEdit()">キャンセル</button>
    </div>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="filter-chip active" onclick="setFilter('all', this)">すべて</button>
    <button class="filter-chip" onclick="setFilter('nihonbashi', this)">日本橋</button>
    <button class="filter-chip" onclick="setFilter('uchikanda', this)">内神田</button>
  </div>

  <div class="restaurant-list" id="restaurant-list">
    <p class="loading">読み込み中...</p>
  </div>

  <div style="margin-top: 2rem;">
    <button class="nav-btn" onclick="showScreen('main')">← メインに戻る</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://vlkbhhtqyerlwwbjobnf.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZsa2JoaHRxeWVybHd3YmpvYm5mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTk5MzQsImV4cCI6MjA5NTA5NTkzNH0.gF6zT5AEXRu5_bMUmp0GHqrCsmT7bOekHlLLbGuaq2U';
const API = `${SUPABASE_URL}/rest/v1/restaurants`;
const HEADERS = {
  'Content-Type': 'application/json',
  'apikey': SUPABASE_KEY,
  'Authorization': `Bearer ${SUPABASE_KEY}`
};

let selectedOffice = null;
let currentResult = null;
let nopeCount = 0;
let usedIds = [];
let allRestaurants = [];
let currentFilter = 'all';
let editingId = null;

// ============ SCREEN NAV ============
function showScreen(name) {
  document.getElementById('screen-main').style.display = 'none';
  document.getElementById('screen-result').style.display = 'none';
  document.getElementById('screen-accepted').style.display = 'none';
  document.getElementById('screen-list').style.display = 'none';

  if (name === 'main') {
    document.getElementById('screen-main').style.display = 'flex';
    nopeCount = 0;
    usedIds = [];
    currentResult = null;
  } else if (name === 'result') {
    document.getElementById('screen-result').style.display = 'flex';
  } else if (name === 'accepted') {
    document.getElementById('screen-accepted').style.display = 'flex';
  } else if (name === 'list') {
    document.getElementById('screen-list').style.display = 'block';
    loadRestaurants();
  }
}

// ============ OFFICE SELECT ============
function selectOffice(office) {
  selectedOffice = office;
  document.querySelectorAll('.office-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('btn-' + office).classList.add('selected');
  document.getElementById('decide-btn').disabled = false;
}

// ============ DECIDE ============
async function decide() {
  const now = new Date();
  const nowMin = now.getHours() * 60 + now.getMinutes();

  let restaurants = allRestaurants.length ? allRestaurants : await fetchAll();
  allRestaurants = restaurants;

  const candidates = restaurants.filter(r => {
    if (r.office !== selectedOffice) return false;
    if (usedIds.includes(r.id)) return false;

    if (r.open_time && r.close_time) {
      const [oh, om] = r.open_time.split(':').map(Number);
      const [ch, cm] = r.close_time.split(':').map(Number);
      const openMin = oh * 60 + om;
      const closeMin = ch * 60 + cm;
      if (nowMin < openMin || nowMin > closeMin) return false;
    }
    return true;
  });

  if (candidates.length === 0) {
    if (usedIds.length > 0) {
      showToast('全候補を試し尽くしました。リセットします！');
      usedIds = [];
      nopeCount = 0;
      decide();
      return;
    }
    showToast('この時間に営業中のお店が見つかりませんでした。お店を追加してください。');
    return;
  }

  const pick = candidates[Math.floor(Math.random() * candidates.length)];
  currentResult = pick;
  showResult(pick);
}

function showResult(r) {
  document.getElementById('result-name').textContent = r.name;

  const tags = document.getElementById('result-tags');
  tags.innerHTML = '';
  if (r.genre) tags.innerHTML += `<span class="tag">${r.genre}</span>`;
  if (r.is_convenience) tags.innerHTML += `<span class="tag convenience">🏪 テイクアウト系</span>`;
  if (r.address) tags.innerHTML += `<span class="tag">📍 ${r.address}</span>`;
  tags.innerHTML += `<span class="tag open">✅ 営業中</span>`;

  document.getElementById('result-notes').textContent = r.notes || '';

  updateNopeUI();
  showScreen('result');
}

function updateNopeUI() {
  const nopeBtn = document.getElementById('nope-btn');
  const nopeCountEl = document.getElementById('nope-count');
  const remaining = 3 - nopeCount;

  if (nopeCount >= 3) {
    nopeBtn.disabled = true;
    nopeCountEl.textContent = '🔒 もう逃げられない。これを食べなさい。';
    nopeCountEl.className = 'nope-count warning';
  } else {
    nopeBtn.disabled = false;
    nopeCountEl.textContent = `あと ${remaining} 回だけ拒否できます`;
    nopeCountEl.className = 'nope-count' + (remaining === 1 ? ' warning' : '');
  }
}

function nope() {
  if (nopeCount >= 3) return;
  nopeCount++;
  usedIds.push(currentResult.id);
  decide();
}

function accept() {
  const officeName = selectedOffice === 'nihonbashi' ? '日本橋' : '内神田';
  document.getElementById('accepted-msg').textContent = `${currentResult.name} に決定！`;
  document.getElementById('accepted-sub').textContent = `${officeName}オフィス付近 • 行ってらっしゃい！`;
  showScreen('accepted');
}

// ============ FETCH ============
async function fetchAll() {
  try {
    const res = await fetch(`${API}?order=created_at.asc`, { headers: HEADERS });
    return await res.json();
  } catch { return []; }
}

// ============ LIST ============
async function loadRestaurants() {
  const listEl = document.getElementById('restaurant-list');
  listEl.innerHTML = '<p class="loading">読み込み中...</p>';
  allRestaurants = await fetchAll();
  renderList();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}

function renderList() {
  const listEl = document.getElementById('restaurant-list');
  const filtered = allRestaurants.filter(r => currentFilter === 'all' || r.office === currentFilter);

  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-state">まだお店が登録されていません<br>上のフォームから追加してください</div>';
    return;
  }

  listEl.innerHTML = filtered.map(r => `
    <div class="restaurant-card">
      <div class="card-info">
        <div class="card-name">${r.name} ${r.is_convenience ? '🏪' : '🍽️'}</div>
        <div class="card-meta">
          ${r.office === 'nihonbashi' ? '日本橋' : '内神田'} 
          ${r.genre ? `• ${r.genre}` : ''}
          ${r.open_time && r.close_time ? `• ${r.open_time}〜${r.close_time}` : ''}
          ${r.closed_days ? `• 定休:${r.closed_days}` : ''}
        </div>
        ${r.notes ? `<div class="card-meta" style="margin-top:4px;color:#a09880">${r.notes}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="edit-btn" onclick="startEdit('${r.id}')">編集</button>
        <button class="delete-btn" onclick="deleteRestaurant('${r.id}')">削除</button>
      </div>
    </div>
  `).join('');
}

// ============ FORM ============
async function submitForm() {
  const name = document.getElementById('f-name').value.trim();
  const office = document.getElementById('f-office').value;
  if (!name) { showToast('お店の名前を入力してください'); return; }

  const data = {
    name,
    office,
    genre: document.getElementById('f-genre').value.trim() || null,
    address: document.getElementById('f-address').value.trim() || null,
    open_time: document.getElementById('f-open').value || null,
    close_time: document.getElementById('f-close').value || null,
    closed_days: document.getElementById('f-closed').value.trim() || null,
    is_convenience: document.getElementById('f-convenience').checked,
    notes: document.getElementById('f-notes').value.trim() || null,
  };

  if (editingId) {
    await fetch(`${API}?id=eq.${editingId}`, {
      method: 'PATCH',
      headers: HEADERS,
      body: JSON.stringify(data)
    });
    showToast('更新しました');
    cancelEdit();
  } else {
    await fetch(API, {
      method: 'POST',
      headers: { ...HEADERS, 'Prefer': 'return=minimal' },
      body: JSON.stringify(data)
    });
    showToast('追加しました！');
    resetForm();
  }
  loadRestaurants();
}

function startEdit(id) {
  const r = allRestaurants.find(x => x.id === id);
  if (!r) return;
  editingId = id;
  document.getElementById('f-name').value = r.name || '';
  document.getElementById('f-office').value = r.office || 'nihonbashi';
  document.getElementById('f-genre').value = r.genre || '';
  document.getElementById('f-address').value = r.address || '';
  document.getElementById('f-open').value = r.open_time || '';
  document.getElementById('f-close').value = r.close_time || '';
  document.getElementById('f-closed').value = r.closed_days || '';
  document.getElementById('f-convenience').checked = r.is_convenience || false;
  document.getElementById('f-notes').value = r.notes || '';
  document.getElementById('form-mode-label').textContent = '✏️ お店を編集';
  document.getElementById('submit-btn').textContent = '更新する';
  document.getElementById('cancel-edit-btn').style.display = 'inline-block';
  document.getElementById('add-form-section').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  editingId = null;
  resetForm();
  document.getElementById('form-mode-label').textContent = '＋ お店を追加';
  document.getElementById('submit-btn').textContent = '追加する';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

function resetForm() {
  ['f-name','f-genre','f-address','f-closed','f-notes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-open').value = '11:00';
  document.getElementById('f-close').value = '14:00';
  document.getElementById('f-convenience').checked = false;
}

async function deleteRestaurant(id) {
  if (!confirm('このお店を削除しますか？')) return;
  await fetch(`${API}?id=eq.${id}`, { method: 'DELETE', headers: HEADERS });
  showToast('削除しました');
  loadRestaurants();
}

// ============ TOAST ============
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// init
showScreen('main');
</script>
</body>
</html>
