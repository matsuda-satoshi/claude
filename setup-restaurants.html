const log = document.getElementById('log');
function addLog(msg, type='ok') {
  const div = document.createElement('div');
  div.className = type;
  div.textContent = msg;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

async function register() {
  log.innerHTML = '';
  addLog(`📋 ${restaurants.length}件のお店を登録します...`, 'info');
  let ok = 0, ng = 0;
  for (const r of restaurants) {
    try {
      const res = await fetch(API, { method:'POST', headers:HEADERS, body:JSON.stringify(r) });
      if (res.ok || res.status === 201) {
        addLog(`✅ ${r.name}（${r.office === 'nihonbashi' ? '日本橋' : '内神田'} / ${r.genre}）`, 'ok');
        ok++;
      } else {
        addLog(`❌ ${r.name} - Status: ${res.status}`, 'err');
        ng++;
      }
    } catch(e) {
      addLog(`❌ ${r.name} - ${e.message}`, 'err');
      ng++;
    }
  }
  addLog(`🎉 完了！ 成功: ${ok}件 / 失敗: ${ng}件`, 'info');
}
